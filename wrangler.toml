name = "usul-proxy"
main = "worker.js"
compatibility_date = "2024-01-01"

# ── Routes ────────────────────────────────────────────────────────────────────
# This Worker handles all /api/* requests on the live domain.
# The Cloudflare Pages site serves everything else as static assets.
# Make sure this route is also confirmed in the Cloudflare Dashboard under
# Workers & Pages → usul-proxy → Settings → Triggers → Routes.

[[routes]]
pattern = "usullearning.com/api/*"
zone_name = "usullearning.com"

# ── Secrets ───────────────────────────────────────────────────────────────────
# These are NOT stored here. Set them once via:
#   wrangler secret put ALLOWED_ORIGIN     → https://usullearning.com
#   wrangler secret put WEB3FORMS_KEY      → your Web3Forms access key
#   wrangler secret put BREVO_KEY          → your Brevo API key
#   wrangler secret put BREVO_LIST_ID      → your Brevo list ID (numeric)
#
# Or set them in the Cloudflare Dashboard:
#   Workers & Pages → usul-proxy → Settings → Variables and Secrets
